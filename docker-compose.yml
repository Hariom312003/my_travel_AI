version: '3.8'

services:
  api:
    build: .
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./memory:/app/memory
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - CHROMA_PATH=/app/memory/chroma_db

  ui:
    build: .
    command: streamlit run ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./memory:/app/memory
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
      - CHROMA_PATH=/app/memory/chroma_db
    depends_on:
      - api
